<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreshConnect AI - Login</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/6d2ea823d0.js" crossorigin="anonymous"></script>
</head>

<body>

<div class="container">

    <div class="left-panel">
        <h1>FreshConnect AI</h1>

        <p>
            AI Powered Freshers Portal
        </p>

        <ul>
            <li>✔ AI Assistant</li>
            <li>✔ College Events</li>
            <li>✔ Faculty Directory</li>
            <li>✔ Clubs</li>
            <li>✔ Timetable</li>
            <li>✔ Notices</li>
        </ul>

    </div>

    <div class="login-box">

        <h2>Student Login</h2>

        <div class="input-box">
            <i class="fa-solid fa-id-card"></i>
            <input
            type="text"
            id="batch"
            placeholder="Batch Number">
        </div>

        <div class="input-box">
            <i class="fa-solid fa-lock"></i>
            <input
            type="password"
            id="password"
            placeholder="Password">
        </div>

        <button onclick="login()">
            Login
        </button>

        <p id="msg"></p>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
